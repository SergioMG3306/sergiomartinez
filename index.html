<style>
/* ============ Design tokens ============ */
:root[data-theme="dark"]{
  --bg:#0e1116; --bg2:#12161d; --panel:#161b24; --panel2:#1a202b; --line:#262d3a; --line2:#303949;
  --tx:#e8eaee; --tx2:#9aa3b2; --tx3:#6b7484;
  --pri:#3b82f6; --pri-soft:rgba(59,130,246,.12);
  --ok:#22c55e; --ok-soft:rgba(34,197,94,.12);
  --warn:#eab308; --warn-soft:rgba(234,179,8,.12);
  --bad:#ef4444; --bad-soft:rgba(239,68,68,.12);
  --gold:#d4a72c;
  --pw1:#3b82f6; --pw2:#14b8a6; --pw3:#22c55e; --pw4:#ef4444; --pwF:#db2777;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
  --grass:#11271c; --grass2:#0d2017;
}
:root[data-theme="light"]{
  --bg:#f6f5f1; --bg2:#efede7; --panel:#ffffff; --panel2:#faf9f6; --line:#e3e0d8; --line2:#d4d0c4;
  --tx:#1c2128; --tx2:#5b6472; --tx3:#8b93a1;
  --pri:#1d4ed8; --pri-soft:rgba(29,78,216,.08);
  --ok:#15803d; --ok-soft:rgba(21,128,61,.09);
  --warn:#a16207; --warn-soft:rgba(161,98,7,.1);
  --bad:#b91c1c; --bad-soft:rgba(185,28,28,.08);
  --gold:#a16207;
  --pw1:#1d4ed8; --pw2:#0f766e; --pw3:#15803d; --pw4:#b91c1c; --pwF:#be185d;
  --shadow:0 1px 2px rgba(28,33,40,.06),0 6px 18px rgba(28,33,40,.07);
  --grass:#e7f0e7; --grass2:#dceadc;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15.5px}
body{
  background:var(--bg); color:var(--tx); min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--pri);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:var(--tx)}
.num{font-variant-numeric:tabular-nums}
h1{font-size:1.55rem;font-weight:750;letter-spacing:-.015em}
h2{font-size:1.12rem;font-weight:700;letter-spacing:-.01em}
h3{font-size:.95rem;font-weight:700}
.sub{color:var(--tx2);font-size:.9rem;line-height:1.55}
.muted{color:var(--tx3);font-size:.78rem}
.kicker{font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3)}

/* ============ Layout ============ */
.topbar{
  position:sticky;top:0;z-index:90;display:flex;align-items:center;gap:14px;
  padding:9px 20px;background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1rem;letter-spacing:.2px;white-space:nowrap}
.brand .logo{width:27px;height:27px;border-radius:7px;display:grid;place-items:center;font-size:14px;background:var(--pri);color:#fff}
.brand small{font-weight:600;color:var(--tx3);font-size:.68rem;margin-left:2px;letter-spacing:.08em}
nav{display:flex;gap:1px;flex:1;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{padding:7px 11px;border-radius:8px;color:var(--tx2);font-size:.83rem;font-weight:600;white-space:nowrap;transition:.15s}
nav button:hover{color:var(--tx);background:var(--panel2)}
nav button.on{color:var(--pri);background:var(--pri-soft);font-weight:700}
.iconbtn{width:32px;height:32px;display:grid;place-items:center;border-radius:8px;border:1px solid var(--line);color:var(--tx2);font-size:.95rem;transition:.15s}
.iconbtn:hover{color:var(--tx);border-color:var(--line2)}
.langbtn{padding:6px 10px;border-radius:8px;font-weight:700;font-size:.76rem;color:var(--tx2);border:1px solid var(--line)}
.langbtn:hover{color:var(--tx);border-color:var(--line2)}
main{max-width:1340px;margin:0 auto;padding:22px 20px 70px}
.view{display:none;animation:fade .3s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes reveal{0%{opacity:0;transform:scale(.92)}60%{transform:scale(1.03)}100%{opacity:1;transform:none}}
footer{border-top:1px solid var(--line);margin-top:56px;padding:22px;text-align:center;color:var(--tx3);font-size:.76rem;line-height:1.7}
.adslot{display:none;max-width:1340px;margin:10px auto 0;padding:0 20px}
.adslot.on{display:block}

/* ============ Cards & primitives ============ */
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 15px;border-radius:9px;
  font-weight:700;font-size:.84rem;background:var(--pri);color:#fff;transition:.15s;border:1px solid transparent}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5;cursor:default}
.btn.sec{background:var(--panel);color:var(--tx);border-color:var(--line2)}
.btn.sec:hover{border-color:var(--pri);color:var(--pri);filter:none}
.btn.warn{background:transparent;color:var(--warn);border-color:color-mix(in srgb,var(--warn) 40%,transparent)}
.btn.warn:hover{background:var(--warn-soft);filter:none}
.btn.bad{background:transparent;color:var(--bad);border-color:color-mix(in srgb,var(--bad) 40%,transparent)}
.btn.bad:hover{background:var(--bad-soft);filter:none}
.btn.sm{padding:6px 11px;font-size:.78rem}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:.7rem;font-weight:700;border:1px solid var(--line);color:var(--tx2)}
.pill.pri{color:var(--pri);border-color:color-mix(in srgb,var(--pri) 38%,transparent);background:var(--pri-soft)}
.pill.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 38%,transparent);background:var(--ok-soft)}
.pill.bad{color:var(--bad);border-color:color-mix(in srgb,var(--bad) 38%,transparent);background:var(--bad-soft)}
.pill.warn{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 38%,transparent);background:var(--warn-soft)}
.flag{font-size:1.25em;line-height:1;display:inline-flex;align-items:center}
.flagimg{height:1em;width:calc(4em/3);object-fit:cover;border-radius:2px;
  box-shadow:0 0 0 1px var(--line),0 1px 2px rgba(0,0,0,.25);vertical-align:-0.12em;display:inline-block}
.bar{height:6px;border-radius:99px;background:var(--bg2);overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:var(--pri);transition:width .6s cubic-bezier(.22,1,.36,1)}
.bar>i.ok{background:var(--ok)} .bar>i.warn{background:var(--warn)} .bar>i.bad{background:var(--bad)}
.tbl{width:100%;border-collapse:collapse;font-size:.84rem}
.tbl th{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);font-weight:700;text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
.tbl td{padding:7px 8px;border-bottom:1px solid var(--line)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--panel2)}
.clk{cursor:pointer}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel)}
.seg button{padding:7px 13px;font-size:.79rem;font-weight:700;color:var(--tx2);transition:.15s}
.seg button.on{background:var(--pri-soft);color:var(--pri)}
.statn{font-size:1.55rem;font-weight:800;letter-spacing:-.02em}
.spark{color:var(--tx3);font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700}

/* ============ Home / groups editor ============ */
.homegrid{display:grid;grid-template-columns:1fr 290px;gap:18px;align-items:start}
@media(max-width:1020px){.homegrid{grid-template-columns:1fr}}
.actionbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0 18px}
.groupsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}
@media(max-width:430px){.groupsgrid{grid-template-columns:1fr}}
.gcard h3{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.gletter{width:26px;height:26px;border-radius:7px;background:var(--pri);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.85rem}
.mrow{display:grid;grid-template-columns:1fr 86px 1fr 20px;align-items:center;gap:6px;padding:5px 4px;border-radius:8px}
.mrow:hover{background:var(--panel2)}
.mrow .side{display:flex;align-items:center;gap:7px;font-weight:600;font-size:.82rem;min-width:0}
.mrow .side.r{justify-content:flex-end;text-align:right}
.mrow .side span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score{display:flex;align-items:center;gap:3px;justify-content:center}
.score input{
  width:34px;height:30px;text-align:center;font-weight:800;font-size:.92rem;border-radius:7px;
  border:1px solid var(--line2);background:var(--bg2);transition:.15s;
  -moz-appearance:textfield;appearance:textfield;
}
.score input::-webkit-outer-spin-button,.score input::-webkit-inner-spin-button{-webkit-appearance:none}
.score input:focus{outline:none;border-color:var(--pri);background:var(--panel)}
.score input.sim{border-style:dashed;color:var(--tx2)}
.srcdot{width:7px;height:7px;border-radius:99px;justify-self:center}
.srcdot.manual{background:var(--pri)} .srcdot.sim{background:var(--tx3)}
.standings{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
.strow{display:grid;grid-template-columns:16px 1fr repeat(5,30px) 36px;gap:3px;align-items:center;font-size:.79rem;padding:3.5px 4px;border-radius:6px}
.strow.head{color:var(--tx3);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.strow .tn{display:flex;align-items:center;gap:6px;font-weight:600;min-width:0}
.strow .tn span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.strow .num{text-align:center}
.strow.q1{box-shadow:inset 2.5px 0 0 var(--ok)}
.strow.q3{box-shadow:inset 2.5px 0 0 var(--warn)}
.strow.fav{background:var(--pri-soft)}
.sidepanel{position:sticky;top:62px;display:flex;flex-direction:column;gap:12px}
.favsel{width:100%;padding:9px 11px;border-radius:9px;background:var(--bg2);border:1px solid var(--line2);font-weight:600;font-size:.86rem}
.statrow{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--line);font-size:.84rem}
.statrow:last-child{border-bottom:none}
.statrow b{font-weight:800}

/* ============ Bracket ============ */
.bktscroll{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--bg2);padding:18px 10px}
.bracket{position:relative;display:grid;grid-template-columns:repeat(9,minmax(128px,1fr));gap:0 14px;min-width:1240px;margin:0 auto}
.bkcolhead{text-align:center;font-size:.64rem;font-weight:800;letter-spacing:.14em;color:var(--tx3);padding-bottom:10px}
.bkcol{display:flex;flex-direction:column;justify-content:space-around;gap:10px;min-height:780px}
.bkmatch{
  position:relative;border:1px solid var(--line);border-radius:10px;background:var(--panel);
  padding:7px 9px;font-size:.78rem;box-shadow:var(--shadow);transition:.15s;cursor:pointer;
}
.bkmatch:hover{border-color:var(--line2);transform:translateY(-1px)}
.bkhint{font-size:.58rem;font-weight:700;color:var(--pri);opacity:0;text-align:center;margin-top:3px;transition:opacity .15s;letter-spacing:.03em}
.bkmatch:hover .bkhint{opacity:1}
@media(hover:none){.bkhint{opacity:.75}}
.bkmatch .mid{font-size:.6rem;font-weight:800;letter-spacing:.06em;margin-bottom:4px;display:flex;justify-content:space-between;color:var(--tx3)}
.bkmatch .mid b{color:var(--pwc,var(--tx3))}
.bkteam{display:flex;align-items:center;gap:6px;padding:3px 2px;border-radius:6px;font-weight:600;min-width:0}
.bkteam .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.bkteam .sc{font-weight:800;min-width:16px;text-align:right}
.bkteam.win{font-weight:800}
.bkteam.lose{opacity:.55}
.bkteam.tbd{color:var(--tx3);font-weight:600;font-style:normal}
.bkteam.fav{background:var(--pri-soft);box-shadow:inset 2px 0 0 var(--pri)}
.bkmatch.pw1{box-shadow:inset 3px 0 0 var(--pw1), var(--shadow)}
.bkmatch.pw2{box-shadow:inset 3px 0 0 var(--pw2), var(--shadow)}
.bkmatch.pw3{box-shadow:inset 3px 0 0 var(--pw3), var(--shadow)}
.bkmatch.pw4{box-shadow:inset 3px 0 0 var(--pw4), var(--shadow)}
.bkmatch.pwF{box-shadow:inset 3px 0 0 var(--pwF), var(--shadow)}
.bkmatch.favpath{border-color:color-mix(in srgb,var(--pri) 55%,transparent)}
.bkfinalcol{display:flex;flex-direction:column;justify-content:center;gap:14px}
.bkchamp{text-align:center;padding:10px;border:1px solid color-mix(in srgb,var(--gold) 45%,transparent);border-radius:10px;background:color-mix(in srgb,var(--gold) 7%,var(--panel))}
.bkwires{position:absolute;inset:0;pointer-events:none}
.bktip{position:fixed;z-index:300;max-width:300px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:.8rem;box-shadow:var(--shadow);display:none}

/* ============ Tour mode ============ */
.tourwrap{max-width:760px;margin:0 auto}
.tourhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.tourprog{flex:1;min-width:160px}
.tourcard{padding:24px}
.tourvs{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;margin:18px 0}
.tourvs .tm{text-align:center}
.tourvs .tm .flag{font-size:2.6rem}
.tourvs .tm h3{margin-top:6px;font-size:1.02rem}
.tourscore{font-size:2rem;font-weight:850;letter-spacing:.02em;padding:10px 20px;border-radius:12px;background:var(--bg2);border:1px solid var(--line);min-width:110px;text-align:center}
.tourscore.reveal{animation:reveal .5s ease}
.tourmeta{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;color:var(--tx3);font-size:.78rem}
.tourbanner{border-left:3px solid var(--pri);padding:10px 14px;background:var(--pri-soft);border-radius:0 9px 9px 0;font-size:.85rem;margin:12px 0}
.tourbanner.bad{border-color:var(--bad);background:var(--bad-soft)}
.tourbanner.ok{border-color:var(--ok);background:var(--ok-soft)}
.tourbanner.gold{border-color:var(--gold);background:color-mix(in srgb,var(--gold) 9%,transparent)}

/* ============ Follow / journey ============ */
.jstage{position:relative;padding-left:40px;padding-bottom:20px}
.jstage:before{content:"";position:absolute;left:13px;top:30px;bottom:-2px;width:2px;background:var(--line2)}
.jstage:last-child:before{display:none}
.jdot{position:absolute;left:0;top:2px;width:28px;height:28px;border-radius:99px;display:grid;place-items:center;font-size:.66rem;font-weight:900;
  background:var(--pri-soft);border:1.5px solid color-mix(in srgb,var(--pri) 50%,transparent);color:var(--pri)}
.jdot.dead{background:var(--bad-soft);border-color:color-mix(in srgb,var(--bad) 50%,transparent);color:var(--bad)}
.jdot.win{background:color-mix(in srgb,var(--gold) 12%,transparent);border-color:color-mix(in srgb,var(--gold) 55%,transparent);color:var(--gold)}
.wdlrow{display:flex;align-items:center;gap:10px;font-size:.82rem;padding:3px 0}
.wdlrow b{width:128px;color:var(--tx2);font-weight:600}
.wdlrow .v{width:54px;text-align:right;font-weight:800}
.oppchip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);font-size:.8rem;font-weight:600;margin:3px 4px 0 0}
.oppchip .p{color:var(--pri);font-weight:800}

/* ============ Pitch ============ */
.pitchwrap{display:grid;grid-template-columns:minmax(290px,400px) 1fr;gap:18px}
@media(max-width:900px){.pitchwrap{grid-template-columns:1fr}}
.pitch{border-radius:12px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow)}
.pp{cursor:pointer}
.pp:hover circle.shirt{filter:brightness(1.18)}

/* ============ Compare ============ */
.cmpgrid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start}
@media(max-width:840px){.cmpgrid{grid-template-columns:1fr}}
.duo{display:flex;height:7px;border-radius:99px;overflow:hidden;background:var(--bg2);border:1px solid var(--line)}
.duo i{height:100%}
.h2hbig{font-size:1.9rem;font-weight:850}

/* ============ Charts (analysis) ============ */
.chartrow{display:flex;align-items:center;gap:11px;padding:6px 4px;cursor:pointer;border-radius:8px}
.chartrow:hover{background:var(--panel2)}
.chartrow .nm{width:168px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden}
.chartrow .bar{flex:1}
.chartrow .v{width:58px;text-align:right;font-weight:800;font-size:.86rem}

/* ============ Calendario ============ */
.caldate{position:sticky;top:52px;z-index:5;background:var(--bg);padding:10px 4px 6px;font-weight:800;font-size:.86rem;text-transform:capitalize;display:flex;align-items:center;gap:10px}
.caldate .pill{font-size:.6rem}
.calrow{display:grid;grid-template-columns:58px 110px 1fr 92px minmax(120px,180px);gap:10px;align-items:center;
  padding:7px 10px;border-radius:9px;font-size:.84rem;cursor:pointer}
.calrow:hover{background:var(--panel2)}
.calrow .tm{display:flex;align-items:center;gap:7px;font-weight:600;min-width:0;flex-wrap:wrap}
.calrow .score{font-weight:800}
.calrow.fav{box-shadow:inset 2.5px 0 0 var(--pri);background:var(--pri-soft)}
@media(max-width:760px){.calrow{grid-template-columns:50px 1fr 80px;gap:8px}.calrow .stg,.calrow .ven{display:none}}

/* ============ Modal / confirm ============ */
.modal{position:fixed;inset:0;z-index:200;background:rgba(8,10,14,.6);backdrop-filter:blur(4px);display:none;place-items:center;padding:20px}
.modal.on{display:grid}
.modal .inner{max-width:640px;width:100%;max-height:84vh;overflow:auto;animation:reveal .25s ease}
.confirm .inner{max-width:430px}
.simctl label{display:block;font-size:.72rem;font-weight:700;color:var(--tx2);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.07em}
.simctl select,.simctl input[type=number]{width:100%;padding:9px 11px;border-radius:9px;background:var(--bg2);border:1px solid var(--line2);font-size:.86rem}
input[type=range]{width:100%;accent-color:var(--pri)}
.prog{height:8px;border-radius:99px;background:var(--bg2);border:1px solid var(--line);overflow:hidden;margin:10px 0}
.prog>i{display:block;height:100%;background:var(--pri);width:0%;transition:width .2s}
.valgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;margin-top:10px}
.valcell{padding:9px 12px;border-radius:9px;border:1px solid color-mix(in srgb,var(--ok) 32%,transparent);background:var(--ok-soft);font-size:.76rem}
.valcell b{display:block;color:var(--ok);font-size:.8rem}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;background:var(--panel);border:1px solid var(--line2);
  border-radius:10px;padding:11px 18px;font-size:.85rem;font-weight:600;box-shadow:var(--shadow);display:none}
.toast.on{display:block;animation:reveal .25s ease}
@media(max-width:640px){
  main{padding:16px 12px 60px}
  html{font-size:15px}
  .mrow{grid-template-columns:1fr 80px 1fr 14px}
}



/* ============ Legal / cookies / AdSense safety ============ */
.adlabel{
  text-align:center;
  font-size:.62rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--tx3);
  margin-bottom:6px;
}
.legal-links{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px 14px;
  margin-top:8px;
}
.legal-links a{color:var(--tx2)}
.legal-links a:hover{color:var(--pri)}
.cookiebar{

  left:18px;
  right:18px;
  bottom:18px;
  z-index:500;
  max-width:980px;
  margin:0 auto;
  display:none;
  grid-template-columns:1fr auto;
  gap:16px;
  align-items:center;
  padding:14px 16px;
  border-radius:14px;
  background:color-mix(in srgb,var(--panel) 96%,transparent);

  backdrop-filter:blur(14px);
}
.cookiebar.on{display:grid;animation:reveal .25s ease}
.cookiebar h3{font-size:.95rem;margin-bottom:4px}
.cookiebar p{font-size:.78rem;line-height:1.45;color:var(--tx2)}
.cookiebar .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.legal-list{display:grid;gap:8px;margin:10px 0 0 18px}
.legal-list li{padding-left:2px}
@media(max-width:720px){
  .cookiebar{
    left:10px;
    right:10px;
    bottom:calc(86px + env(safe-area-inset-bottom));
    grid-template-columns:1fr;
  }
  .cookiebar .actions{justify-content:flex-start}
}

/* ============ Mobile navigation fix ============ */
@media(max-width:720px){
  body{
    padding-bottom:calc(76px + env(safe-area-inset-bottom));
  }
  .topbar{
    padding:8px 12px;
    gap:8px;
  }
  .brand{
    flex:1;
    min-width:0;
    font-size:.92rem;
  }
  .brand small{display:none}
  .brand .logo{width:26px;height:26px;border-radius:7px}
  #themebtn,.langbtn{
    flex:0 0 auto;
  }
  nav#nav{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:180;
    display:flex;
    flex:0 0 auto;
    width:100%;
    gap:6px;
    padding:9px 10px calc(9px + env(safe-area-inset-bottom));
    overflow-x:auto;
    overflow-y:hidden;
    background:color-mix(in srgb,var(--panel) 94%,transparent);
    border-top:1px solid var(--line);
    box-shadow:0 -10px 28px rgba(0,0,0,.28);
    backdrop-filter:blur(14px);
    scrollbar-width:thin;
    scroll-snap-type:x proximity;
    -webkit-overflow-scrolling:touch;
  }
  nav#nav::-webkit-scrollbar{display:block;height:4px}
  nav#nav::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px}
  nav#nav button{
    flex:0 0 auto;
    min-width:92px;
    max-width:132px;
    padding:9px 10px;
    border-radius:11px;
    font-size:.74rem;
    line-height:1.15;
    text-align:center;
    white-space:normal;
    scroll-snap-align:center;
    border:1px solid var(--line);
    background:var(--bg2);
    color:var(--tx2);
  }
  nav#nav button.on{
    background:var(--pri);
    color:#fff;
    border-color:var(--pri);
    box-shadow:0 4px 14px color-mix(in srgb,var(--pri) 35%,transparent);
  }
  main{
    padding:14px 10px calc(96px + env(safe-area-inset-bottom));
  }
  .homegrid{gap:12px}
  .actionbar{position:sticky;top:45px;z-index:50;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(10px);padding:8px 0;margin:8px 0 12px}
  .groupsgrid{grid-template-columns:1fr;gap:12px}
  .card{border-radius:11px;padding:13px}
}

@media(max-width:420px){
  nav#nav button{
    min-width:86px;
    font-size:.7rem;
    padding:8px 8px;
  }
  .iconbtn{width:30px;height:30px}
  .langbtn{padding:6px 8px}
  h1{font-size:1.32rem}
}

}

/* ---------- modelo Poisson (espejo del motor Python) ---------- */
const MODEL = D.meta.model;
function lambdasFor(sa,sb){
  const d=sa-sb;
  return [Math.min(4,Math.max(.15,MODEL.base_xg*Math.exp(MODEL.k_slope*d))),
          Math.min(4,Math.max(.15,MODEL.base_xg*Math.exp(-MODEL.k_slope*d)))];
}
function poisArr(lam,k=22){ const o=[]; let p=Math.exp(-lam); for(let i=0;i<k;i++){o.push(p);p*=lam/(i+1);} return o; }
function matchProbs(a,b){
  const [la,lb]=lambdasFor(D.teams[a].strength,D.teams[b].strength);
  const pa=poisArr(la),pb=poisArr(lb);
  let w=0,dd=0,l=0,best=0,bi=0,bj=0;
  for(let i=0;i<pa.length;i++)for(let j=0;j<pb.length;j++){
    const p=pa[i]*pb[j];
    if(i>j)w+=p; else if(i===j)dd+=p; else l+=p;
    if(p>best){best=p;bi=i;bj=j;}
  }
  return {w,d:dd,l,score:[bi,bj],scoreP:best,la,lb};
}
function koWinProb(a,b){
  const m=matchProbs(a,b);
  const pa=poisArr(m.la/3,12),pb=poisArr(m.lb/3,12);
  let w2=0,d2=0;
  for(let i=0;i<pa.length;i++)for(let j=0;j<pb.length;j++){
    const p=pa[i]*pb[j]; if(i>j)w2+=p; else if(i===j)d2+=p;
  }
  const pen=.5+Math.max(-.05,Math.min(.05,(D.teams[a].strength-D.teams[b].strength)*MODEL.pen_edge));
  return m.w+m.d*(w2+d2*pen);
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function poissonSample(lam,rnd){ rnd=rnd||Math.random; const L=Math.exp(-lam); let k=0,p=1; do{k++;p*=rnd();}while(p>L); return k-1; }
/* Configuración de simulación interactiva (volatilidad => más o menos sorpresas) */
const SIM_CFG = { vol:'media', seed:null };
const VOL_PRESETS = {
  baja:  {kMul:1.45, noise:0},     // resultados muy lógicos, gana casi siempre el favorito
  media: {kMul:1.0,  noise:0},     // modelo calibrado (realista)
  alta:  {kMul:0.55, noise:0.45},  // mucha varianza: sorpresas y goleadas inesperadas
};
function simLambdas(a,b){
  const p=VOL_PRESETS[SIM_CFG.vol]||VOL_PRESETS.media;
  const d=(D.teams[a].strength-D.teams[b].strength)*p.kMul;
  const rnd=Sim.rng||Math.random;
  let la=Math.min(4,Math.max(.15,MODEL.base_xg*Math.exp(MODEL.k_slope*d)));
  let lb=Math.min(4,Math.max(.15,MODEL.base_xg*Math.exp(-MODEL.k_slope*d)));
  if(p.noise){ la=Math.min(4.5,la+rnd()*p.noise*2); lb=Math.min(4.5,lb+rnd()*p.noise*2); }
  return [la,lb];
}

/* ---------- Estado (Store) ---------- */
const LS_KEY='wc26pulse_v2';
const Store = {
  state:{version:2,results:{},favorite:null,theme:'dark',lang:'es',tourCursor:0},
  load(){
    try{
      const raw=localStorage.getItem(LS_KEY);
      if(raw){ const s=JSON.parse(raw); if(s&&s.version===2) this.state={...this.state,...s}; }
    }catch(e){}
    this.sanitize();
  },
  sanitize(){
    const current=this.state&&typeof this.state==='object'?this.state:{};
    this.state={version:2,results:{},favorite:null,theme:'dark',lang:'es',tourCursor:0,...current};
    if(this.state.lang!=='es'&&this.state.lang!=='en') this.state.lang='es';
    if(this.state.theme!=='dark'&&this.state.theme!=='light') this.state.theme='dark';
    if(!CODES.includes(this.state.favorite)) this.state.favorite=null;
    const clean={};
    const rawResults=this.state.results;
    if(rawResults&&typeof rawResults==='object'&&!Array.isArray(rawResults)){
      for(const [key,r] of Object.entries(rawResults)){
        const isGroup=/^G(?:[0-9]|[1-6][0-9]|7[01])$/.test(key);
        const isKO=/^M(?:7[3-9]|8[0-9]|9[0-9]|10[0-4])$/.test(key);
        if((!isGroup&&!isKO)||!r||typeof r!=='object') continue;
        const h=Number(r.h), a=Number(r.a);
        if(!Number.isInteger(h)||!Number.isInteger(a)||h<0||a<0||h>20||a>20) continue;
        if(isKO&&h===a&&r.penWinner!=='H'&&r.penWinner!=='A') continue;
        clean[key]={h,a,source:r.source==='sim'?'sim':'manual'};
        if(isKO&&h===a) clean[key].penWinner=r.penWinner;
      }
    }
    this.state.results=clean;
    const cursor=Number(this.state.tourCursor);
    this.state.tourCursor=Number.isFinite(cursor)?Math.max(0,Math.min(104,Math.floor(cursor))):0;
  },
  save(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(this.state)); }catch(e){} },
  result(key){ return this.state.results[key]||null; },
  setResult(key,h,a,source,penWinner){
    if(!Number.isInteger(h)||!Number.isInteger(a)||h<0||a<0||h>20||a>20) return false;
    const r={h,a,source};
    if(key[0]==='M'&&h===a) r.penWinner=penWinner||null;
    this.state.results[key]=r;
    this.invalidateDownstream(key);
    this.save(); return true;
  },
  removeResult(key){ delete this.state.results[key]; this.invalidateDownstream(key); this.save(); },
  invalidateDownstream(key){
    // si cambia un resultado, los partidos KO posteriores cuyo origen depende de él dejan de ser válidos:
    // política: borrar resultados KO que ya no correspondan (se recalculan al volver a simular).
    if(key[0]==='G'){
      // un cambio en grupos invalida TODO el cuadro simulado (los entrantes pueden cambiar).
      for(const k of Object.keys(this.state.results)) if(k[0]==='M') delete this.state.results[k];
      if(this.state.tourCursor>72) this.state.tourCursor=Derive.firstPendingIndex();
    } else {
      const mid=+key.slice(1);
      const downstream=[];
      const walk=(m)=>{ for(const [child,fs] of Object.entries(FEEDERS)) if(fs.includes(m)){ downstream.push(+child); walk(+child); } };
      walk(mid);
      downstream.forEach(m=>delete this.state.results['M'+m]);
    }
  },
  clearSim(){
    for(const [k,r] of Object.entries(this.state.results)) if(r.source==='sim') delete this.state.results[k];

    this.state.tourCursor=0; this.save();
    if(typeof applyOfficialResults==='function') applyOfficialResults();
  },
  clearAll(alsoFavorite){
    this.state.results={}; this.state.tourCursor=0;
    if(alsoFavorite) this.state.favorite=null;
    this.save();
    if(typeof applyOfficialResults==='function') applyOfficialResults();

/* ---------- Derivadores puros ---------- */
const Derive = {
  groupFixtureIdx(g){ const out=[]; D.fixtures.forEach((f,i)=>{ if(f.group===g) out.push(i); }); return out; },
  table(g){
    const teams=D.groups[g];
    const rows={}; teams.forEach(c=>rows[c]={code:c,pj:0,pts:0,gf:0,gc:0,dg:0});
    const h2h={}; teams.forEach(c=>h2h[c]={});
    for(const i of this.groupFixtureIdx(g)){
      const r=Store.result('G'+i); if(!r) continue;
      const f=D.fixtures[i];
      const H=rows[f.home],A=rows[f.away];
      H.pj++;A.pj++; H.gf+=r.h;H.gc+=r.a; A.gf+=r.a;A.gc+=r.h;
      if(r.h>r.a){H.pts+=3; h2h[f.home][f.away]=3; h2h[f.away][f.home]=0;}
      else if(r.h<r.a){A.pts+=3; h2h[f.away][f.home]=3; h2h[f.home][f.away]=0;}
      else {H.pts++;A.pts++; h2h[f.home][f.away]=1; h2h[f.away][f.home]=1;}
    }
    Object.values(rows).forEach(r=>r.dg=r.gf-r.gc);
    const order=Object.values(rows).sort((x,y)=>
      (y.pts-x.pts)||(y.dg-x.dg)||(y.gf-x.gf)||
      ((h2h[y.code][x.code]??0)-(h2h[x.code][y.code]??0))||
      (x.code<y.code?-1:1));
    order.forEach((r,i)=>r.pos=i+1);
    return order;
  },
  groupPlayed(g){ return this.groupFixtureIdx(g).filter(i=>Store.result('G'+i)).length; },
  groupDone(g){ return this.groupPlayed(g)===6; },
  allGroupsDone(){ return GROUPS_L.split('').every(g=>this.groupDone(g)); },
  classification(){ // {g:{w,r,t}} solo grupos completos
    const out={};
    for(const g of GROUPS_L){ if(!this.groupDone(g)) continue;
      const t=this.table(g); out[g]={w:t[0].code,r:t[1].code,t:t[2].code,f:t[3].code,rows:t}; }
    return out;
  },
  thirdsSlots(){ // null si grupos incompletos; si completos: {slotIdx: teamCode}
    if(!this.allGroupsDone()) return null;
    const cls=this.classification();
    const thirds=GROUPS_L.split('').map(g=>{
      const row=cls[g].rows[2]; return {g,code:row.code,pts:row.pts,dg:row.dg,gf:row.gf};
    });
    thirds.sort((x,y)=>(y.pts-x.pts)||(y.dg-x.dg)||(y.gf-x.gf)||(x.code<y.code?-1:1));
    const qual=thirds.slice(0,8).map(t=>t.g).sort();
    const mask=qual.reduce((m,g)=>m|(1<<GROUPS_L.indexOf(g)),0);
    const letters=D.annexc[String(mask)];
    if(!letters) return null;
    const byGroup={}; thirds.forEach(t=>byGroup[t.g]=t.code);
    const slots={}; letters.forEach((g,s)=>slots[s]=byGroup[g]);
    return slots;
  },
  thirdsRanking(){
    // ranking de terceros con los grupos COMPLETOS hasta ahora (parcial si faltan grupos)
    const rows=[];
    for(const g of GROUPS_L){ if(!this.groupDone(g)) continue;
      const r=this.table(g)[2]; rows.push({g,code:r.code,pts:r.pts,dg:r.dg,gf:r.gf}); }
    rows.sort((x,y)=>(y.pts-x.pts)||(y.dg-x.dg)||(y.gf-x.gf)||(x.code<y.code?-1:1));
    return rows;
  },
  /* asignación PROVISIONAL de terceros: proyecta los 3º de los grupos ya completos
     (≥8 grupos) sobre las plazas del Anexo C; exacta cuando están los 12. */
  thirdsSlotsProvisional(){
    if(this.allGroupsDone()) return {slots:this.thirdsSlots(),exact:true};
    const rows=this.thirdsRanking();
    if(rows.length<8) return null;
    const qual=rows.slice(0,8).map(r=>r.g).sort();
    const mask=qual.reduce((m,g)=>m|(1<<GROUPS_L.indexOf(g)),0);
    const letters=D.annexc[String(mask)];
    if(!letters) return null;
    const byGroup={}; rows.forEach(r=>byGroup[r.g]=r.code);
    const slots={}; letters.forEach((g,i)=>slots[i]=byGroup[g]);
    return {slots,exact:false};
  },
  groupMatchesLeft(){ let n=0; for(let i=0;i<72;i++) if(!Store.result('G'+i)) n++; return n; },
  /* selecciones que siguen vivas: no eliminadas en grupos (si ya cerraron) ni en un cruce jugado */
  aliveTeams(){
    const dead=new Set();
    if(this.allGroupsDone()){
      const cls=this.classification();
      const slots=this.thirdsSlots();
      const qual=new Set();
      for(const g of GROUPS_L){ qual.add(cls[g].w); qual.add(cls[g].r); }
      if(slots) Object.values(slots).forEach(c=>qual.add(c));
      CODES.forEach(c=>{ if(!qual.has(c)) dead.add(c); });
    }
    for(let m=73;m<=102;m++){ const {loser}=this.koWinnerLoser(m); if(loser) dead.add(loser); }
    const f=this.koWinnerLoser(104); if(f.loser) dead.add(f.loser);
    return CODES.filter(c=>!dead.has(c));
  },
  koResult(mid){ return Store.result('M'+mid); },
  koWinnerLoser(mid){
    const teams=this.matchTeams(mid); const r=this.koResult(mid);
    if(!teams.home||!teams.away||!r) return {winner:null,loser:null};
    if(r.h>r.a) return {winner:teams.home,loser:teams.away};
    if(r.h<r.a) return {winner:teams.away,loser:teams.home};
    if(r.penWinner==='H') return {winner:teams.home,loser:teams.away};
    if(r.penWinner==='A') return {winner:teams.away,loser:teams.home};
    return {winner:null,loser:null};
  },
  matchTeams(mid){ // -> {home,away} (códigos o null) + etiquetas de origen
    if(mid<=88){
      const spec=R32_SPEC[mid]; const cls=this.classification(); const slots=this.thirdsSlots();
      const res=(s)=>{ const [k,v]=s;
        if(k==='W') return cls[v]?cls[v].w:null;
        if(k==='R') return cls[v]?cls[v].r:null;
        return slots?slots[v]:null; };
      return {home:res(spec.home),away:res(spec.away),
              homeLbl:originLabel(spec.home),awayLbl:originLabel(spec.away)};
    }
    const [fa,fb]=FEEDERS[mid];
    if(mid===103){
      const A=this.koWinnerLoser(fa).loser, B=this.koWinnerLoser(fb).loser;
      return {home:A,away:B,homeLbl:'L'+fa,awayLbl:'L'+fb};
    }
    return {home:this.koWinnerLoser(fa).winner,away:this.koWinnerLoser(fb).winner,
            homeLbl:'W'+fa,awayLbl:'W'+fb};
  },
  champion(){ return this.koWinnerLoser(104).winner; },
  // cola cronológica del torneo: 72 de grupos + 32 KO
  schedule(){
    const out=D.fixtures.map((f,i)=>({key:'G'+i,kind:'G',date:f.date,group:f.group,idx:i}));
    const mids=[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88,89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104];
    mids.forEach(m=>{ const meta=m<=88?R32_SPEC[m]:KO_META[m];
      out.push({key:'M'+m,kind:'M',date:meta.date,mid:m}); });
    return out;
  },
  firstPendingIndex(){
    const sch=this.schedule();
    for(let i=0;i<sch.length;i++) if(!Store.result(sch[i].key)) return i;
    return sch.length;
  },
  playedCount(){ return Object.keys(Store.state.results).length; },
  phaseLabel(){
    const n=Object.keys(Store.state.results).filter(k=>k[0]==='G').length;
    if(n<72) return (App.lang==='es'?'Fase de grupos':'Group stage')+` · ${n}/72`;
    const ko=Object.keys(Store.state.results).filter(k=>k[0]==='M').length;
    if(ko<32) return (App.lang==='es'?'Eliminatorias':'Knockouts')+` · ${ko}/32`;
    return App.lang==='es'?'Torneo completado':'Tournament complete';
  },
  favoriteStatus(){
    const fav=Store.state.favorite; if(!fav) return null;
    const g=D.teams[fav].group;
    if(this.groupDone(g)){
      const cls=this.classification()[g];
      const slots=this.thirdsSlots();
      const isThirdQ=slots&&Object.values(slots).includes(fav);
      if(cls.w!==fav&&cls.r!==fav&&!isThirdQ&&this.allGroupsDone())
        return {alive:false,stage:'groups'};
    }
    // eliminado en KO?
    for(let m=73;m<=104;m++){
      if(m===103) continue;
      const t=this.matchTeams(m); const r=this.koResult(m);
      if(r&&(t.home===fav||t.away===fav)){
        const {winner}=this.koWinnerLoser(m);
        if(winner&&winner!==fav) return {alive:false,stage:'M'+m};
        if(m===104&&winner===fav) return {alive:true,champion:true};
      }
    }
    return {alive:true};
  },
};

/* ---------- Simulación interactiva ---------- */
const Sim = {
  rng:null,   // RNG con semilla (reproducible) o null => Math.random
  applySeed(){ Sim.rng = SIM_CFG.seed!=null ? mulberry32(SIM_CFG.seed) : null; },
  playGroup(i){
    const f=D.fixtures[i];
    const [la,lb]=simLambdas(f.home,f.away);
    const rnd=Sim.rng||Math.random;
    return {h:poissonSample(la,rnd),a:poissonSample(lb,rnd)};
  },
  playKO(home,away){
    const d=this.playKODetailed(home,away);
    return {h:d.h,a:d.a,penWinner:d.penWinner};
  },
  playKODetailed(home,away){
    const [la,lb]=simLambdas(home,away);
    const rnd=Sim.rng||Math.random;
    const h90=poissonSample(la,rnd), a90=poissonSample(lb,rnd);
    let h=h90,a=a90,hET=0,aET=0,penWinner=null,et=false,shootout=null;
    if(h===a){ et=true; hET=poissonSample(la/3,rnd); aET=poissonSample(lb/3,rnd); h+=hET; a+=aET;
      if(h===a){ shootout=Sim.genShootout(home,away,rnd); penWinner=shootout.winner; } }
    return {h,a,h90,a90,hET,aET,et,penWinner,shootout};
  },
  /* tiradores ordenados por calidad: tendencia de gol + media (los mejores lanzan primero) */
  penTakers(team){
    return D.lineups[team].xi.filter(p=>p.slot!=='GK')
      .slice().sort((x,y)=>(y.goal_t*1.5+y.rating)-(x.goal_t*1.5+x.rating));
  },
  penConvProb(p){ // prob. de convertir el penalti según el tirador (~75% medio real)
    return Math.max(.55,Math.min(.93, .70+(p.rating-75)*.006+Math.min(p.goal_t,40)*.002));
  },
  /* tanda completa: 5 rondas alternas + muerte súbita, con corte anticipado como en la realidad */
  genShootout(home,away,rnd){
    rnd=rnd||Sim.rng||Math.random;
    const TH=Sim.penTakers(home), TA=Sim.penTakers(away);
    const kicks=[]; let hs=0,as=0;
    let round=0;
    while(true){
      round++;
      const th=TH[(round-1)%TH.length], ta=TA[(round-1)%TA.length];
      // lanza el local
      const gH=rnd()<Sim.penConvProb(th); if(gH)hs++;
      kicks.push({n:round,side:'H',taker:th,scored:gH,hs,as});
      // corte anticipado: el visitante ya no puede alcanzar (le quedan 5-round+1 tiros)
      if(round<=5&&as+(5-round+1)<hs){ return {winner:'H',kicks,hs,as}; }
      // lanza el visitante
      const gA=rnd()<Sim.penConvProb(ta); if(gA)as++;
      kicks.push({n:round,side:'A',taker:ta,scored:gA,hs,as});
      if(round<=5){
        if(hs+(5-round)<as) return {winner:'A',kicks,hs,as};
        if(as+(5-round)<hs) return {winner:'H',kicks,hs,as};
        if(round===5&&hs!==as) return {winner:hs>as?'H':'A',kicks,hs,as};
      } else if(hs!==as){ return {winner:hs>as?'H':'A',kicks,hs,as}; }
      if(round>=20){ return {winner:rnd()<.5?'H':'A',kicks,hs,as}; } // salvaguarda
    }
  },
  /* fuerza un ganador concreto con un marcador plausible (para «decide tú quién pasa») */
  forceWinner(home,away,winnerSide){
    for(let i=0;i<40;i++){
      const d=this.playKODetailed(home,away);
      const w=d.h>d.a?'H':d.h<d.a?'A':d.penWinner;
      if(w===winnerSide) return d;
    }
    return winnerSide==='H'?{h:1,a:0,h90:1,a90:0,hET:0,aET:0,et:false,penWinner:null}
                           :{h:0,a:1,h90:0,a90:1,hET:0,aET:0,et:false,penWinner:null};
  },
  // simula SOLO partidos pendientes, respetando todos los resultados existentes
  fillPending(){
    let n=0;
    for(let i=0;i<72;i++) if(!Store.result('G'+i)){
      const r=this.playGroup(i); Store.setResult('G'+i,r.h,r.a,'sim'); n++;
    }
    // eliminatorias en orden (los entrantes se derivan del estado ya completo)
    const mids=[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88,89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104];
    for(const m of mids){
      if(Store.result('M'+m)) continue;
      const t=Derive.matchTeams(m);
      if(!t.home||!t.away) continue;
      const r=this.playKO(t.home,t.away);
      Store.setResult('M'+m,r.h,r.a,'sim',r.penWinner);
      n++;
    }
    return n;
  },
};

    if(window.tourAbort) window.tourAbort(true);

      teams:renderTeams,compare:renderCompare,analysis:renderAnalysis,method:renderMethod};
    if(!renderers[v]) v='home';

    document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));

const CONSENT_KEY = 'wc26_cookie_consent_v1';

const Consent = {
  get(){
    try{
      const c=JSON.parse(localStorage.getItem(CONSENT_KEY)||'null');
      if(!c||typeof c!=='object'||!c.choice) return null;
      return {
        choice:String(c.choice),
        necessary:true,
        ads:c.ads===true,
        personalized:c.personalized===true,
        ts:c.ts||null
      };
    }catch(e){ return null; }
  },
  save(v){
    try{ localStorage.setItem(CONSENT_KEY,JSON.stringify({...v,ts:new Date().toISOString()})); }catch(e){}
  },
  init(){
    const bar=document.getElementById('cookiebar');
    if(!bar) return;
    this.localize();
    const accept=document.getElementById('cookie-accept');
    const reject=document.getElementById('cookie-reject');
    const more=document.getElementById('cookie-more');
    if(accept) accept.onclick=()=>this.acceptAll();
    if(reject) reject.onclick=()=>this.rejectAds();
    if(more) more.onclick=()=>showCookies();
    const c=this.get();
    if(c && c.choice){
      bar.classList.remove('on');
      if(c.ads===true) setTimeout(()=>App.initAds(),0);
    }else{
      bar.classList.add('on');
      window.adsbygoogle = window.adsbygoogle || [];
      window.adsbygoogle.pauseAdRequests = 1;
    }
  },
  localize(){
    const es=App.lang==='es';
    const title=document.getElementById('cookiebar-title');
    const txt=document.getElementById('cookiebar-text');
    const accept=document.getElementById('cookie-accept');
    const reject=document.getElementById('cookie-reject');
    const more=document.getElementById('cookie-more');
    if(title) title.textContent=es?'Privacidad y cookies':'Privacy and cookies';
    if(txt) txt.textContent=es
      ?'Guardamos tu predicción en este navegador y solo cargamos publicidad de Google cuando aceptas cookies de publicidad. Puedes usar la herramienta con cookies necesarias únicamente.'
      :'Your prediction is stored in this browser and Google advertising loads only when you accept advertising cookies. You can use the tool with necessary cookies only.';
    if(accept) accept.textContent=es?'Aceptar publicidad':'Accept advertising';
    if(reject) reject.textContent=es?'Solo necesarias':'Necessary only';
    if(more) more.textContent=es?'Más información':'More information';
  },
  acceptAll(){
    this.save({choice:'accept',necessary:true,ads:true,personalized:true});
    const bar=document.getElementById('cookiebar'); if(bar) bar.classList.remove('on');
    App._adsLoaded=false;
    setTimeout(()=>App.initAds(),0);
    toast(App.lang==='es'?'Cookies de publicidad aceptadas.':'Advertising cookies accepted.');
  },
  rejectAds(){
    this.save({choice:'necessary',necessary:true,ads:false,personalized:false});
    window.adsbygoogle = window.adsbygoogle || [];
    window.adsbygoogle.pauseAdRequests = 1;
    const bar=document.getElementById('cookiebar'); if(bar) bar.classList.remove('on');
    toast(App.lang==='es'?'Configuración guardada: solo cookies necesarias.':'Saved: necessary cookies only.');
  },
  openSettings(){
    try{ localStorage.removeItem(CONSENT_KEY); }catch(e){}
    App._adsLoaded=false;
    const slot=document.getElementById('adslot-main'); if(slot) slot.classList.remove('on');
    this.init();
  }
};

const WIRE_PARENT = {89:[74,77],90:[73,75],93:[83,84],94:[81,82],97:[89,90],98:[93,94],101:[97,98],
                     91:[76,78],92:[79,80],95:[86,88],96:[85,87],99:[91,92],100:[95,96],102:[99,100],
                     104:[101,102]};
function drawWires(){
  const root=document.getElementById('bracket'); const svg=document.getElementById('bkwires');
  if(!root||!svg) return;
  const rw=root.scrollWidth, rh=root.scrollHeight;
  if(!rw||!rh){ svg.innerHTML=''; return; } // jsdom / sin layout
  svg.setAttribute('viewBox',`0 0 ${rw} ${rh}`); svg.setAttribute('width',rw); svg.setAttribute('height',rh);
  const rootRect=root.getBoundingClientRect();
  const box=(mid)=>{ const e=root.querySelector(`[data-mid="${mid}"]`); if(!e) return null;
    const r=e.getBoundingClientRect();
    return {x1:r.left-rootRect.left,x2:r.right-rootRect.left,ym:(r.top+r.bottom)/2-rootRect.top}; };
  let paths='';
  const favSet=new Set();
  if(Store.state.favorite){
    for(let m=73;m<=104;m++){ const tt=Derive.matchTeams(m);
      if(tt.home===Store.state.favorite||tt.away===Store.state.favorite) favSet.add(m); }
  }
  for(const [child,parents] of Object.entries(WIRE_PARENT)){
    const c=box(+child); if(!c) continue;
    const childLeft = (+child===104);
    for(const p of parents){
      const b=box(p); if(!b) continue;
      const leftSide = b.x1 < c.x1;       // padre a la izquierda del hijo
      const sx = leftSide ? b.x2 : b.x1;  // salida del padre
      const ex = leftSide ? c.x1 : c.x2;  // entrada al hijo
      const midX = (sx+ex)/2;
      const hot = favSet.has(p)&&favSet.has(+child);
      paths+=`<path d="M${sx} ${b.ym} H${midX} V${c.ym} H${ex}" fill="none"
        stroke="${hot?'var(--pri)':'var(--line2)'}" stroke-width="${hot?2.2:1.4}"/>`;
    }
  }
  svg.innerHTML=paths;
}

/* ================= Monte Carlo condicionado (worker) ================= */
const COND_WORKER_SRC = `
'use strict';
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let rnd;
function poisson(lam){const L=Math.exp(-lam);let k=0,p=1;do{k++;p*=rnd();}while(p>L);return k-1;}
onmessage=function(e){
  const {N,seed,S,groups,fixtures,r32,annexc,model,fixedG,fixedKO}=e.data;
  rnd=mulberry32(seed);
  const lam=(a,b)=>{const d=S[a]-S[b];
    return [Math.min(4,Math.max(.15,model.base_xg*Math.exp(model.k_slope*d))),
            Math.min(4,Math.max(.15,model.base_xg*Math.exp(-model.k_slope*d)))];};
  function ko(a,b,mid){
    const fx=fixedKO[mid];
    if(fx&&((fx[0]===a&&fx[1]===b)||(fx[0]===b&&fx[1]===a))){
      // resultado fijado y entrantes coinciden -> respetar
      const homeIsA=fx[0]===a;
      const hG=fx[2],aG=fx[3];
      if(hG>aG) return homeIsA?a:b;
      if(hG<aG) return homeIsA?b:a;
      return (fx[4]==='H')===homeIsA?a:b;
    }
    const [la,lb]=lam(a,b);
    let ga=poisson(la),gb=poisson(lb);
    if(ga===gb){ga+=poisson(la/3);gb+=poisson(lb/3);
      if(ga===gb){const pe=.5+Math.max(-.05,Math.min(.05,(S[a]-S[b])*model.pen_edge));return rnd()<pe?a:b;}}
    return ga>gb?a:b;
  }
  const ch=new Float64Array(48), fin=new Float64Array(48), sf=new Float64Array(48), adv=new Float64Array(48);
  const R16P=[[74,77],[73,75],[76,78],[79,80],[83,84],[81,82],[86,88],[85,87]];
  const QFP=[[89,90],[93,94],[91,92],[95,96]]; const SFP=[[97,98],[99,100]];
  let dup=0;
  for(let s=0;s<N;s++){
    const pts=new Int16Array(48),gd=new Int16Array(48),gf=new Int16Array(48);
    for(let m=0;m<72;m++){
      const [h,a]=fixtures[m];
      let ga,gb;
      if(fixedG[m]){ ga=fixedG[m][0]; gb=fixedG[m][1]; }
      else { const [la,lb]=lam(h,a); ga=poisson(la); gb=poisson(lb); }
      if(ga>gb)pts[h]+=3; else if(ga===gb){pts[h]++;pts[a]++;} else pts[a]+=3;
      gd[h]+=ga-gb;gd[a]+=gb-ga;gf[h]+=ga;gf[a]+=gb;
    }
    const winners=[],runners=[],thirds=[];
    for(let g=0;g<12;g++){
      const tg=groups[g].slice();
      tg.sort((x,y)=>(pts[y]-pts[x])||(gd[y]-gd[x])||(gf[y]-gf[x])||(rnd()-.5));
      winners.push(tg[0]);runners.push(tg[1]);thirds.push(tg[2]);
    }
    const order=[...Array(12).keys()].sort((x,y)=>{const a=thirds[x],b=thirds[y];
      return (pts[b]-pts[a])||(gd[b]-gd[a])||(gf[b]-gf[a])||(rnd()-.5);});
    let mask=0; for(const g of order.slice(0,8)) mask|=1<<g;
    const slots=annexc[mask]; if(!slots) continue;
    const tbs=slots.map(g=>thirds[g]);
    const mw={}; const seen=new Set();
    for(const [mid,hk,hv,ak,av] of r32){
      const A=hk===0?winners[hv]:hk===1?runners[hv]:tbs[hv];
      const B=ak===0?winners[av]:ak===1?runners[av]:tbs[av];
      if(seen.has(A)||seen.has(B))dup++;
      seen.add(A);seen.add(B);
      adv[A]++;adv[B]++;
      mw[mid]=ko(A,B,mid);
    }
    const w={};
    R16P.forEach((p,i)=>{w[89+i]=ko(mw[p[0]],mw[p[1]],89+i);});
    QFP.forEach((p,i)=>{w[97+i]=ko(w[p[0]],w[p[1]],97+i);});
    SFP.forEach((p,i)=>{const A=w[p[0]],B=w[p[1]];sf[A]++;sf[B]++;w[101+i]=ko(A,B,101+i);});
    const FA=w[101],FB=w[102];fin[FA]++;fin[FB]++;
    ch[ko(FA,FB,104)]++;
  }
  postMessage({type:'done',N,ch:Array.from(ch),fin:Array.from(fin),sf:Array.from(sf),adv:Array.from(adv),
    validations:{champ_pct:Array.from(ch).reduce((a,b)=>a+b,0)/N*100,dup_errors:dup,
      final_slots:Array.from(fin).reduce((a,b)=>a+b,0)/N}});
};
`;
let condWorker=null;
function buildCondPayload(N,seed){
  const gidx={}; CODES.forEach((c,i)=>gidx[c]=i);
  const S=CODES.map(c=>D.teams[c].strength);
  const groups=GROUPS_L.split('').map(g=>D.groups[g].map(c=>gidx[c]));
  const fixtures=D.fixtures.map(f=>[gidx[f.home],gidx[f.away]]);
  const KIND={W:0,R:1,T:2};
  const r32=D.bracket.r32.map(m=>{
    const conv=s=>s[0]==='T'?[2,+s[1]]:[KIND[s[0]],GROUPS_L.indexOf(s[1])];
    const [hk,hv]=conv(m.home),[ak,av]=conv(m.away);
    return [m.id,hk,hv,ak,av];
  });
  const annexc={};
  for(const [mask,letters] of Object.entries(D.annexc)) annexc[+mask]=letters.map(L=>GROUPS_L.indexOf(L));
  const fixedG=Array(72).fill(null);
  for(let i=0;i<72;i++){ const r=Store.result('G'+i); if(r) fixedG[i]=[r.h,r.a]; }
  const fixedKO={};
  for(let m=73;m<=102;m++){
    const r=Store.result('M'+m); if(!r) continue;
    const tt=Derive.matchTeams(m); if(!tt.home||!tt.away) continue;
    fixedKO[m]=[gidx[tt.home],gidx[tt.away],r.h,r.a,r.penWinner||null];
  }
  const r104=Store.result('M104');
  if(r104){ const tt=Derive.matchTeams(104);
    if(tt.home&&tt.away) fixedKO[104]=[gidx[tt.home],gidx[tt.away],r104.h,r104.a,r104.penWinner||null]; }
  return {N,seed,S,groups,fixtures,r32,annexc,model:MODEL,fixedG,fixedKO};
}
function runCondSim(N,targetId){

const Tour = { live:null };
function tourAbort(stopAuto){
  if(Tour.live){ clearTimeout(Tour.live.timer); Tour.live=null; }
  clearTimeout(Tour._chain);
  if(stopAuto) App._tourAuto=false;
}
window.tourAbort=tourAbort;

function tourItem(idx){ const sch=Derive.schedule(); return idx<sch.length?sch[idx]:null; }
function tourTeamsOf(item){
  if(item.kind==='G'){ const f=D.fixtures[item.idx]; return {home:f.home,away:f.away,meta:f}; }
  const t=Derive.matchTeams(item.mid);
  const meta=item.mid<=88?R32_SPEC[item.mid]:KO_META[item.mid];
  return {home:t.home,away:t.away,homeLbl:t.homeLbl,awayLbl:t.awayLbl,meta};
}
/* goleador ponderado por tendencia de gol del XI */
function pickScorer(team){
  const xi=D.lineups[team].xi.filter(p=>p.slot!=='GK');
  const tot=xi.reduce((s,p)=>s+p.goal_t+0.5,0);
  let r=Math.random()*tot;
  for(const p of xi){ r-=p.goal_t+0.5; if(r<=0) return p; }
  return xi[xi.length-1];
}
/* cronología de goles del partido (minutos + goleadores) */
function buildTimeline(home,away,detail){
  const ev=[];
  const rndMin=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  for(let i=0;i<(detail.h90??detail.h);i++) ev.push({min:rndMin(2,90),team:home,scorer:pickScorer(home)});
  for(let i=0;i<(detail.a90??detail.a);i++) ev.push({min:rndMin(2,90),team:away,scorer:pickScorer(away)});
  if(detail.et){
    for(let i=0;i<detail.hET;i++) ev.push({min:rndMin(92,120),team:home,scorer:pickScorer(home)});
    for(let i=0;i<detail.aET;i++) ev.push({min:rndMin(92,120),team:away,scorer:pickScorer(away)});
  }
  ev.sort((x,y)=>x.min-y.min);
  let h=0,a=0;
  ev.forEach(e=>{ if(e.team===home)h++; else a++; e.h=h; e.a=a; });
  return ev;
}

function tourFastForwardToFav(){
  const fav=Store.state.favorite;
  const sch=Derive.schedule();
  let guard=0;
  while(guard++<120){
    const idx=Derive.firstPendingIndex();
    if(idx>=sch.length) return;
    const item=sch[idx];
    const tm=tourTeamsOf(item);
    if(!tm.home||!tm.away) return;
    if(tm.home===fav||tm.away===fav) return;
    commitTourResult(item,true);
  }
}
function commitTourResult(item,silent){
  if(item.kind==='G'){
    const r=Sim.playGroup(item.idx);
    Store.setResult(item.key,r.h,r.a,'sim');
    if(!silent) App._tourLast=item.key;
    return r;
  }
  const tm=Derive.matchTeams(item.mid);
  if(!tm.home||!tm.away) return null;
  const r=Sim.playKO(tm.home,tm.away);
  Store.setResult(item.key,r.h,r.a,'sim',r.penWinner);
  if(!silent) App._tourLast=item.key;
  return r;
}

  const item=tourItem(idx); if(!item) return;
  const t=T();

  else detail=Sim.playKODetailed(tm.home,tm.away);
  const events=buildTimeline(tm.home,tm.away,detail);
  const endMin=detail.et?120:90;
  // 2) UI en vivo
  const pre=document.getElementById('tourpre'), feed=document.getElementById('tourfeed'),

  feed.innerHTML=`<div class="muted" style="text-align:center">🏟 ${esc(t.liveStart)}</div>`;
  let h=0,a=0;
  Tour.live={item,detail,events,tm,min:0,h,a,ms:App._tourAuto?80:200,endMin,timer:null,done:false};
  const tick=()=>{
    const L=Tour.live; if(!L) return;
    L.min++;
    if(L.min===91&&L.detail.et){
      feed.insertAdjacentHTML('afterbegin',`<div class="tourbanner" style="margin:6px 0">⏱ ${esc(t.liveET)} — ${L.h}–${L.a}</div>`);
    }
    const sc=document.getElementById('tourscore'); if(!sc){ tourAbort(); return; }
    while(L.events.length&&L.events[0].min<=L.min){
      const e=L.events.shift();
      L.h=e.h; L.a=e.a;
      feed.insertAdjacentHTML('afterbegin',
        `<div style="display:flex;gap:8px;align-items:center;padding:5px 8px;border-left:3px solid var(--pri);background:var(--pri-soft);border-radius:0 8px 8px 0;margin:4px 0;font-size:.84rem;animation:reveal .3s ease">
          <b class="num" style="width:30px">${e.min}'</b> ⚽ <b>${esc(t.liveGoal)}</b>
          <span>${esc(e.scorer.shirt_name)} <span class="muted">(${esc(tname(e.team))})</span></span>
          <b class="num" style="margin-left:auto">${e.h}–${e.a}</b>
        </div>`);
    }
    sc.innerHTML=`<span class="num">${L.h} : ${L.a}</span><div class="muted" style="font-size:.7rem;font-weight:700;margin-top:2px">${Math.min(L.min,L.endMin)}'</div>`;
    if(L.min>=L.endMin){
      if(L.detail.shootout&&!L.pensStarted){ tourPensAnim(); return; }
      tourLiveFinish(); return;
    }
    L.timer=setTimeout(tick,L.ms);
  };
  Tour.live.timer=setTimeout(tick,Tour.live.ms);
}

              :`<button class="btn sec" onclick="App.go('bracket')">${esc(t.bracket)}</button>`}`;

      if(!App._tourAuto||App.view!=='tour') return;

  for(let i=idx;i<sch.length&&sch[i].date===date;i++){
    const item=sch[i];
    if(Store.result(item.key)) continue;
    const r=commitTourResult(item,true);
    if(r) last=item.key;
  }
  App._tourLast=last;
  renderTour();
}
function tourProbs(a,b,ko){
  const t=T(); const m=matchProbs(a,b);
  let rows;
  if(ko){ const p=koWinProb(a,b);
    rows=[[tname(a),p*100,''],[tname(b),(1-p)*100,'']];

    rows=[[t.win+' '+tname(a),m.w*100,'ok'],[t.draw,m.d*100,'warn'],[t.win+' '+tname(b),m.l*100,'bad']];

  return `<div style="max-width:440px;margin:0 auto">
    <div class="spark" style="margin-bottom:6px">${esc(t.prob)} · ${esc(t.likelyScore)}: ${m.score[0]}–${m.score[1]}</div>

    const f=D.fixtures[i]; const r=Store.result('G'+i);
    const home=f.home===team; const opp=home?f.away:f.home;
    const [pw,pd,pl]=home?f.p:[f.p[2],f.p[1],f.p[0]];
    const sc=r?(home?[r.h,r.a]:[r.a,r.h]):(home?f.score:[f.score[1],f.score[0]]);
    const status=r?(sc[0]>sc[1]?'ok':sc[0]<sc[1]?'bad':'warn'):null;
    html+=`<div class="jstage"><div class="jdot">J${n+1}</div>
      <div class="card">
        <div class="spark" style="margin-bottom:8px">${esc(t.groupStage)} · ${esc(t.md)} ${n+1} · ${esc(f.date)} · ${esc(f.venue)}
          ${r?`<span class="pill ${status}" style="margin-left:8px">${esc(t.actualScore)} · ${r.source==='sim'?esc(t.simDot):esc(t.manualDot)}</span>`:''}</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-weight:700">
          ${flag(team)} ${esc(tname(team))}
          <span class="tourscore" style="font-size:1.1rem;padding:4px 14px;min-width:0">${sc[0]} – ${sc[1]}</span>
          ${esc(tname(opp))} ${flag(opp)}
          ${!r?`<span class="muted" style="margin-left:auto">${esc(t.likelyScore)} · ${fmtPct(f.score_p*100)}</span>`:''}
        </div>
        ${!r?`<div style="margin-top:10px">
          ${[[t.win,pw,'ok'],[t.draw,pd,'warn'],[t.loss,pl,'bad']].map(([l,vv,c])=>

  });
  const done=Derive.groupDone(g);
  if(done){
    const rows=Derive.table(g); const myRow=rows.find(r=>r.code===team);
    const slots=Derive.thirdsSlots();
    const isQ=myRow.pos<=2||(slots&&Object.values(slots).includes(team));
    html+=`<div class="jstage"><div class="jdot ${isQ?'':'dead'}">${myRow.pos}º</div>

      ${miniTable(g)}
      <div style="margin-top:8px"><span class="pill ${isQ?'ok':'bad'}">${isQ?'✓ '+esc(t.qualified):'✕ '+esc(t.out)}</span></div>
      </div></div>`;
  } else {
    html+=`<div class="jstage"><div class="jdot">?</div>
      <div class="card"><div class="spark" style="margin-bottom:8px">${esc(t.groupOutcome)} · ${App.lang==='es'?'proyección del modelo':'model projection'}</div>
      ${[[t.pos1,tm.p_group_pos[0],'ok'],[t.pos2,tm.p_group_pos[1],'ok'],[t.pos3q,tm.p_third_qualified,'warn'],[t.out,100-pq,'bad']].map(([l,vv,c])=>

      </div></div>`;
  }

    const tt=Derive.matchTeams(m);
    if(tt.home===team||tt.away===team) realKO[ROUND_OF(m)]={mid:m,...tt};
  }
  for(const [round,kReach] of ROUNDS){
    if(eliminated) break;
    const real=realKO[round];
    if(real){
      const r=Derive.koResult(real.mid);
      const opp=real.home===team?real.away:real.home;
      const {winner}=r?Derive.koWinnerLoser(real.mid):{winner:null};
      const lost=winner&&winner!==team;
      if(lost) eliminated=true;
      const sc=r?(real.home===team?[r.h,r.a]:[r.a,r.h]):null;
      const p=koWinProb(team,opp);
      html+=`<div class="jstage"><div class="jdot ${lost?'dead':winner===team?'win':''}">${{r32:'1/16',r16:'1/8',qf:'1/4',sf:'1/2',final:'F'}[round]}</div>

        </div></div>`;
      continue;
    }
    const reach=tm[kReach];
    const opps=(D.opponents[round]&&D.opponents[round][team])||[];
    const dead=!deadShown&&reach<50;
    if(dead) deadShown=true;
    html+=`<div class="jstage"><div class="jdot ${reach<50?'dead':''}">${{r32:'1/16',r16:'1/8',qf:'1/4',sf:'1/2',final:'F'}[round]}</div>
      <div class="card" style="${reach<25?'opacity:.65':''}">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <h3>${esc(t.roundTags[round])}</h3>
          <span class="pill ${reach>=50?'pri':''}">${esc(t.pReach)}: <b class="num">${fmtPct(reach)}</b></span>
        </div>
        ${dead?`<p style="color:var(--bad);font-weight:700;font-size:.84rem;margin:8px 0 0">✕ ${esc(t.eliminatedHere)}</p>`:''}
        <div style="margin-top:8px"><span class="spark">${esc(t.likelyOpp)}</span><br>
          ${opps.slice(0,5).map(([o,p])=>`<span class="oppchip clk" onclick="App.cmpA='${team}';App.cmpB='${o}';App.go('compare')">
            ${flag(o)} ${esc(tname(o))} <span class="p num">${fmtPct(p)}</span></span>`).join('')||'—'}
        </div>
      </div></div>`;
  }
  const isChamp=Derive.champion()===team;
  if(!eliminated){
    html+=`<div class="jstage"><div class="jdot win">🏆</div>
      <div class="card" style="border-color:color-mix(in srgb,var(--gold) 40%,transparent)">

        </div>
      </div></div>`;
  }
  html+='</div>';
  v.innerHTML=html;
}

function condTableHTML(res){
  const t=T();
  const rows=sortedByChamp().slice(0,18);
  return `<table class="tbl"><thead><tr><th></th>
    <th style="text-align:right">${esc(t.baselineCol)}</th>
    <th style="text-align:right">${esc(t.nowCol)}</th>
    <th style="text-align:right">Δ</th></tr></thead>
  <tbody>${rows.map(c=>{
    const base=D.teams[c].p_champion;
    let now='—',delta='';
    if(res){
      const i=CODES.indexOf(c);
      const p=res.ch[i]/res.N*100;
      now=fmtPct(p);
      const d=p-base;
      delta=`<span style="color:${d>0.05?'var(--ok)':d<-0.05?'var(--bad)':'var(--tx3)'}">${d>0?'+':''}${d.toFixed(1)}</span>`;
    }
    return `<tr><td><span class="flag">${flag(c)}</span> <b>${esc(tname(c))}</b></td>
      <td class="num" style="text-align:right">${fmtPct(base)}</td>
      <td class="num" style="text-align:right;font-weight:800">${now}</td>
      <td class="num" style="text-align:right">${delta}</td></tr>`;
  }).join('')}</tbody></table>`;
}
function runCondTable(){
  const t=T();
  const N=+document.getElementById('condN').value;
  const status=document.getElementById('condStatus');
  if(typeof Worker==='undefined'){ status.textContent='Web Worker N/D'; return; }
  status.textContent=t.running;
  if(condWorker) condWorker.terminate();
  condWorker=new Worker(URL.createObjectURL(new Blob([COND_WORKER_SRC],{type:'application/javascript'})));
  const t0=Date.now();
  condWorker.onmessage=e=>{
    if(e.data.type!=='done') return;
    status.textContent=`✓ ${e.data.N.toLocaleString()} sims · ${((Date.now()-t0)/1000).toFixed(1)}s · Σ=${e.data.validations.champ_pct.toFixed(1)}% · dup=${e.data.validations.dup_errors}`;
    document.getElementById('condTable').innerHTML=condTableHTML(e.data);
  };
  condWorker.postMessage(buildCondPayload(N,D.meta.seed));
}

function calKickoff(item){
  return item.kind==='G' ? D.kickoff.G[item.idx] : D.kickoff.M[String(item.mid)];
}
function calFmt(iso,tz){
  const d=new Date(iso);
  const loc=App.lang==='es'?'es-ES':'en-GB';
  const opts=tz?{timeZone:tz}:{};
  const time=new Intl.DateTimeFormat(loc,{...opts,hour:'2-digit',minute:'2-digit',hour12:false}).format(d);
  const date=new Intl.DateTimeFormat(loc,{...opts,weekday:'long',day:'numeric',month:'long'}).format(d);
  const dayKey=new Intl.DateTimeFormat('en-CA',{...opts,year:'numeric',month:'2-digit',day:'2-digit'}).format(d);
  return {time,date,dayKey};
}
function renderCalendar(){
  const t=T(); const v=document.getElementById('v-calendar');
  const tz=Store.state.calTz||'';
  const onlyFav=!!App._calOnlyFav&&!!Store.state.favorite;
  const fav=Store.state.favorite;
  const sch=Derive.schedule();
  // construir filas ordenadas por hora de inicio real
  const rows=sch.map(item=>{
    const iso=calKickoff(item);
    let home,away,homeLbl='',awayLbl='',stage,venue,clickable;
    if(item.kind==='G'){
      const f=D.fixtures[item.idx];
      home=f.home; away=f.away; stage=t.groupTag(item.group); venue=f.venue; clickable=`App.go('home')`;
    } else {
      const tt=Derive.matchTeams(item.mid);
      home=tt.home; away=tt.away; homeLbl=tt.homeLbl; awayLbl=tt.awayLbl;
      stage='M'+item.mid+' · '+t.roundTags[ROUND_OF(item.mid)];
      venue=(item.mid<=88?R32_SPEC[item.mid]:KO_META[item.mid]).venue;
      clickable=`App.go('bracket');setTimeout(()=>openKO(${item.mid}),50)`;
    }
    const r=Store.result(item.key);
    return {item,iso,home,away,homeLbl,awayLbl,stage,venue,clickable,r};
  }).sort((a,b)=>a.iso<b.iso?-1:1);

  const filtered=onlyFav?rows.filter(x=>x.home===fav||x.away===fav):rows;
  const todayKey=new Intl.DateTimeFormat('en-CA',tz?{timeZone:tz}:{}).format(new Date());

  let lastDay=null, body='';
  for(const x of filtered){
    const f=calFmt(x.iso,tz);
    if(f.dayKey!==lastDay){
      lastDay=f.dayKey;
      body+=`<div class="caldate">${esc(f.date)} ${f.dayKey===todayKey?`<span class="pill warn">${esc(t.todayLbl)}</span>`:''}</div>`;
    }
    const isFavRow=fav&&(x.home===fav||x.away===fav);
    const matchup = x.home&&x.away
      ? `<span class="flag">${flag(x.home)}</span> <span>${esc(tname(x.home))}</span>
         ${x.r?`<span class="score num">${x.r.h}–${x.r.a}${x.r.h===x.r.a&&x.r.penWinner?'ᵖ':''}</span>`:`<span class="muted">vs</span>`}
         <span class="flag">${flag(x.away)}</span> <span>${esc(tname(x.away))}</span>
         ${x.r?`<span class="srcdot ${x.r.source==='sim'?'sim':'manual'}" title="${x.r.source==='sim'?esc(t.simDot):esc(t.manualDot)}"></span>`:''}`
      : `<span class="muted">${esc(x.homeLbl)} ${App.lang==='es'?'contra':'vs'} ${esc(x.awayLbl)}</span>`;
    body+=`<div class="calrow ${isFavRow?'fav':''}" onclick="${x.clickable}">
      <b class="num">${esc(f.time)}</b>
      <span class="stg"><span class="pill ${x.item.kind==='M'?'pri':''}" style="padding:1px 8px">${esc(x.stage)}</span></span>
      <span class="tm">${matchup}</span>
      <span class="num muted" style="text-align:right">${x.r?'':''}</span>
      <span class="ven muted" style="text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(x.venue)}</span>
    </div>`;
  }

  v.innerHTML=`<div class="kicker">${esc(t.tag)}</div>
  <h1 style="margin:6px 0 8px">${esc(t.calendar)}</h1>
  <p class="sub" style="max-width:780px;margin-bottom:12px">${esc(t.calendarSub)}</p>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
    <label class="muted">${esc(t.tzLabel)}</label>
    <select class="favsel" style="width:auto;min-width:240px" onchange="Store.state.calTz=this.value;Store.save();renderCalendar()">
      ${CAL_TZS.map(([z,l])=>`<option value="${z}" ${tz===z?'selected':''}>${esc(l||t.tzLocal)}</option>`).join('')}
    </select>
    ${Store.state.favorite?`<label class="pill clk" style="gap:6px"><input type="checkbox" ${onlyFav?'checked':''}
      onchange="App._calOnlyFav=this.checked;renderCalendar()"> ${esc(t.onlyFav)}</label>`:''}
    <span class="muted" style="margin-left:auto">${esc(t.officialNote)}</span>
  </div>
  <div class="card" style="padding:8px 10px">${body}</div>`;
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bootApp,{once:true});
else bootApp();

</script>
</body>
</html>
